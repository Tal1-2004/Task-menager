<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Task Manager</h1>

    <div class="input-section">
      <input type="text" id="taskInput" placeholder="Write a task...">
      <button id="addBtn">Add</button>
    </div>

    <ul id="taskList"></ul>
  </div>
  <div class="filters">
  <button id="filter-all" onclick="setFilter('all')">All</button>
  <button id="filter-active" onclick="setFilter('active')">Active</button>
  <button id="filter-completed" onclick="setFilter('completed')">Completed</button>
  <p id="taskCounter"></p>
  </div>
  <div class="clear-container">
  <button id="clearCompleted">Clear</button>
  </div>
  

  <script src="script.js"></script>
</body>
</html>
